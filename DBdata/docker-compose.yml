version: '3.8'

services:
  # --- BAZA DANYCH (PostgreSQL) ---
  db:
    image: postgres:15
    container_name: movie-match-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: haslo
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      # 1. Montujemy skrypt SQL. Docker wykona go automatycznie TYLKO przy pierwszym uruchomieniu czystej bazy.
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
      
      # 2. Montujemy pliki CSV bezpośrednio do głównego katalogu kontenera (/).
      # Jest to konieczne, bo w SQL masz: COPY ... FROM '/movies.csv'
      - ./movies.csv:/movies.csv
      - ./ratings.csv:/ratings.csv
      - ./links.csv:/links.csv
      - ./tags.csv:/tags.csv
      
      # 3. Trwałość danych. Dzięki temu dane przeżyją restart komputera.
      # (Ale usunie je komenda 'docker-compose down -v')
      - postgres_data:/var/lib/postgresql/data

  
# --- BAZA DANYCH (Neo4j) ---
  neo4j:
    image: neo4j:5
    container_name: mm-neo4j-db
    restart: always
    environment:
      NEO4J_AUTH: neo4j/Neo4j.haslo
    ports:
      - "7474:7474" # Interfejs graficzny przeglądarki Neo4j
      - "7687:7687" # Port protokołu Bolt (dla Node.js)
    volumes:
   
      - ./movies.csv:/var/lib/neo4j/import/movies.csv
      - ./ratings.csv:/var/lib/neo4j/import/ratings.csv
      - ./links.csv:/var/lib/neo4j/import/links.csv
      - ./tags.csv:/var/lib/neo4j/import/tags.csv
      - neo4j_data:/data

volumes:
  postgres_data:
  neo4j_data: